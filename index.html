<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Watch AI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, 'SF Pro Rounded', 'Helvetica Neue', sans-serif;
  }

  .watch-frame {
    width: 184px;
    height: 224px;
    background: #0a0a0a;
    border-radius: 44px;
    border: 2px solid #2a2a2a;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px 4px;
    flex-shrink: 0;
  }
  .time { font-size: 11px; font-weight: 600; color: #888; }
  .status { display: flex; align-items: center; gap: 4px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #30d158; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .netlabel { font-size: 9px; color: #30d158; }

  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 4px 10px 4px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    scroll-behavior: smooth;
  }
  .chat-area::-webkit-scrollbar { display: none; }

  .bubble {
    max-width: 92%;
    padding: 6px 9px;
    border-radius: 14px;
    font-size: 10.5px;
    line-height: 1.45;
    word-break: break-word;
  }
  .bubble.user {
    background: #0a84ff;
    color: #fff;
    align-self: flex-end;
    border-bottom-right-radius: 3px;
  }
  .bubble.ai {
    background: #1c1c1e;
    color: #e8e8ed;
    align-self: flex-start;
    border-bottom-left-radius: 3px;
    border: 0.5px solid #2c2c2e;
  }
  .bubble.loading {
    display: flex; gap: 4px; align-items: center; padding: 8px 10px;
  }
  .ld { width: 4px; height: 4px; border-radius: 50%; background: #666; animation: blink 1.2s infinite; }
  .ld:nth-child(2){ animation-delay:.2s }
  .ld:nth-child(3){ animation-delay:.4s }
  @keyframes blink { 0%,80%,100%{opacity:.25} 40%{opacity:1} }

  .empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #444;
    font-size: 9.5px;
    text-align: center;
    gap: 6px;
    padding-bottom: 10px;
  }
  .empty-icon { font-size: 24px; }

  .quick-row {
    display: flex;
    gap: 4px;
    padding: 4px 8px 3px;
    overflow-x: auto;
    flex-shrink: 0;
  }
  .quick-row::-webkit-scrollbar { display: none; }
  .qbtn {
    background: #1c1c1e;
    border: 0.5px solid #3a3a3c;
    border-radius: 10px;
    padding: 4px 7px;
    font-size: 9px;
    color: #aaa;
    cursor: pointer;
    white-space: nowrap;
    font-family: inherit;
    flex-shrink: 0;
    -webkit-appearance: none;
  }
  .qbtn:active { background: #2c2c2e; color: #fff; }

  .input-row {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 8px 10px;
    flex-shrink: 0;
  }
  .inp {
    flex: 1;
    background: #1c1c1e;
    border: 0.5px solid #3a3a3c;
    border-radius: 18px;
    padding: 6px 10px;
    font-size: 10px;
    color: #f0f0f0;
    outline: none;
    -webkit-appearance: none;
    font-family: inherit;
    min-width: 0;
  }
  .inp::placeholder { color: #555; }
  .inp:focus { border-color: #0a84ff; }

  .sbtn {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: #0a84ff;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform .1s, opacity .1s;
    -webkit-appearance: none;
  }
  .sbtn:active { transform: scale(.88); opacity: .8; }
  .sbtn svg { width: 13px; height: 13px; fill: white; }

  /* SETUP SCREEN */
  .setup-screen {
    position: absolute; inset: 0;
    background: #0a0a0a;
    border-radius: 42px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 14px 12px;
    z-index: 10;
    gap: 8px;
  }
  .setup-screen h2 { font-size: 12px; font-weight: 600; color: #f0f0f0; text-align: center; }
  .setup-screen p { font-size: 9.5px; color: #888; text-align: center; line-height: 1.4; }
  .setup-screen input {
    width: 100%;
    background: #1c1c1e;
    border: 0.5px solid #3a3a3c;
    border-radius: 12px;
    padding: 7px 10px;
    font-size: 9.5px;
    color: #f0f0f0;
    outline: none;
    font-family: inherit;
    -webkit-appearance: none;
    text-align: center;
  }
  .setup-screen input:focus { border-color: #0a84ff; }
  .setup-ok {
    width: 100%;
    background: #0a84ff;
    border: none;
    border-radius: 12px;
    padding: 7px;
    font-size: 10px;
    font-weight: 600;
    color: #fff;
    cursor: pointer;
    font-family: inherit;
    -webkit-appearance: none;
  }
  .setup-ok:active { opacity: .8; }
  .key-icon { font-size: 20px; }
  .err-msg { font-size: 9px; color: #ff453a; text-align: center; min-height: 12px; }
</style>
</head>
<body>

<div class="watch-frame" id="app">

  <!-- SETUP SCREEN -->
  <div class="setup-screen" id="setupScreen">
    <div class="key-icon">🔑</div>
    <h2>API Key</h2>
    <p>Pega tu API key<br>(Groq, Gemini, DeepSeek...)</p>
    <input type="password" id="apiKeyInput" placeholder="Pega tu API key aquí" autocomplete="off" spellcheck="false" />
    <div class="err-msg" id="setupErr"></div>
    <button class="setup-ok" onclick="saveKey()">Activar IA</button>
    <p style="font-size:8.5px;color:#555;margin-top:2px">Se guarda solo en este dispositivo</p>
  </div>

  <!-- MAIN CHAT -->
  <div class="topbar">
    <span class="time" id="clock">--:--</span>
    <div class="status">
      <div class="dot"></div>
      <span class="netlabel">IA</span>
    </div>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="empty" id="emptyHint">
      <div class="empty-icon">✦</div>
      <span>IA con internet<br>lista para ayudarte</span>
    </div>
  </div>

  <div class="quick-row">
    <button class="qbtn" onclick="q('¿Tiempo en Madrid hoy?')">🌤 Clima</button>
    <button class="qbtn" onclick="q('Noticias más importantes ahora')">📰 Noticias</button>
    <button class="qbtn" onclick="q('Dime algo interesante')">✨ Dato</button>
    <button class="qbtn" onclick="q('Chiste corto')">😄 Chiste</button>
    <button class="qbtn" onclick="clearChat()">🗑 Borrar</button>
    <button class="qbtn" onclick="resetKey()">🔑 API</button>
  </div>

  <div class="input-row">
    <input class="inp" id="userInput" type="text" placeholder="Pregunta…" maxlength="140" />
    <button class="sbtn" onclick="send()" aria-label="Enviar">
      <svg viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>

</div>

<script>
let busy = false;
let history = [];

// Clock
function tick(){
  const n = new Date();
  document.getElementById('clock').textContent =
    String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}
tick(); setInterval(tick, 15000);

// Key management
function getKey(){ return localStorage.getItem('watchai_key') || ''; }
function saveKey(){
  const v = document.getElementById('apiKeyInput').value.trim();
  if(v.length < 10){
    document.getElementById('setupErr').textContent = 'Clave inválida';
    return;
  }
  localStorage.setItem('watchai_key', v);
  document.getElementById('setupScreen').style.display = 'none';
}

// Init: hide setup if key exists
if(getKey()){
  document.getElementById('setupScreen').style.display = 'none';
} else {
  document.getElementById('setupScreen').style.display = 'flex';
}

// Chat helpers
function bubble(text, role, load=false){
  const hint = document.getElementById('emptyHint');
  if(hint) hint.remove();
  const area = document.getElementById('chatArea');
  const d = document.createElement('div');
  d.className = 'bubble ' + role + (load ? ' loading' : '');
  if(load){
    d.innerHTML = '<div class="ld"></div><div class="ld"></div><div class="ld"></div>';
  } else {
    d.textContent = text;
  }
  area.appendChild(d);
  area.scrollTop = area.scrollHeight;
  return d;
}

function resetKey(){
  const screen = document.getElementById('setupScreen');
  const inp = document.getElementById('apiKeyInput');
  inp.value = getKey(); // pre-fill with current key so user can edit it
  document.getElementById('setupErr').textContent = '';
  screen.style.display = 'flex';
  setTimeout(() => inp.focus(), 100);
}

function clearChat(){
  history = [];
  document.getElementById('chatArea').innerHTML =
    '<div class="empty" id="emptyHint"><div class="empty-icon">✦</div><span>IA con internet<br>lista para ayudarte</span></div>';
}

async function send(){
  if(busy) return;
  const inp = document.getElementById('userInput');
  const msg = inp.value.trim();
  if(!msg) return;
  const key = getKey();
  if(!key){ document.getElementById('setupScreen').style.display='flex'; return; }
  inp.value = '';
  busy = true;

  bubble(msg, 'user');
  history.push({ role:'user', content: msg });

  const lb = bubble('', 'ai', true);

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'x-provider': 'groq',
      },
      body: JSON.stringify({
        system: 'Eres un asistente IA en un Apple Watch. Responde SIEMPRE en español. Respuestas muy cortas: máximo 3 frases. Sin markdown, sin asteriscos, sin listas. Solo texto limpio.',
        messages: history
      })
    });

    const data = await res.json();

    if(data.error){
      lb.classList.remove('loading');
      lb.textContent = 'Error: ' + (data.error.message || 'API error');
      history.pop();
      busy = false;
      return;
    }

    let reply = '';
    if(data.content){
      for(const b of data.content){
        if(b.type === 'text' && b.text) reply += b.text;
      }
    }
    reply = reply.replace(/\*\*/g,'').replace(/\*/g,'').replace(/#{1,6} /g,'').trim();
    if(!reply) reply = 'Sin respuesta.';
    if(reply.length > 260) reply = reply.substring(0,257)+'…';

    lb.classList.remove('loading');
    lb.textContent = reply;
    history.push({ role:'assistant', content: reply });
    if(history.length > 20) history = history.slice(-20);

  } catch(e){
    lb.classList.remove('loading');
    lb.textContent = 'Sin conexión. Verifica internet.';
    history.pop();
  }

  busy = false;
  document.getElementById('chatArea').scrollTop = 9999;
}

function q(text){
  document.getElementById('userInput').value = text;
  send();
}

document.getElementById('userInput').addEventListener('keydown', e => {
  if(e.key === 'Enter') send();
});
</script>
</body>
</html>
